name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12']

    services:
      db:
        image: postgres:16
        env:
          POSTGRES_USER: paperless
          POSTGRES_PASSWORD: paperless
          POSTGRES_DB: paperlesscheck
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U paperless -d paperlesscheck"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint (ruff)
        working-directory: backend
        run: ruff check .

      - name: Format check (black)
        working-directory: backend
        run: black --check .

      - name: Prepare database schema
        working-directory: backend
        env:
          DATABASE_URL: postgresql://paperless:paperless@localhost:5432/paperlesscheck
        run: |
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 < ../database/init.sql

      - name: Run tests (pytest)
        working-directory: backend
        env:
          DATABASE_URL: postgresql://paperless:paperless@localhost:5432/paperlesscheck
          FLASK_ENV: test
        run: pytest -q

  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build

