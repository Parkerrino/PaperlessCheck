name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.12]
        node-version: [20]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt

    - name: Lint backend (ruff)
      run: ruff check backend/

    - name: Format check (black)
      run: black --check backend/

    - name: Test backend with pytest
      run: pytest backend/tests/ -v

    - name: Set up Node ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Frontend build
      working-directory: ./frontend
      run: |
        npm ci
        npm run build --if-present

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: paperless
          POSTGRES_USER: paperless
          POSTGRES_DB: paperlesscheck
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4

    - name: Run DB init test
      run: |
        docker compose up -d db
        docker compose up backend --wait
        docker compose exec db psql -U paperless -d paperlesscheck -c "SELECT COUNT(*) FROM checklists;"
        curl -f http://localhost:5000/health || curl -f http://localhost:127.0.0.1:5000/health
        docker compose down


